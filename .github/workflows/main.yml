name: 自动构建演示文稿 (Marp Build)

on:
  push:
    branches: [ main ] 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 创建输出目录
        run: mkdir -p build
      
      - name: 编译 PDF 
        uses: docker://marpteam/marp-cli:v3.4.0
        with:
          args: slide.md --pdf --allow-local-files --html -o build/slide.pdf
        env:
          MARP_USER: root:root
          
      - name: 编译 PPTX
        uses: docker://marpteam/marp-cli:v3.4.0
        with:
          args: slide.md --pptx --allow-local-files --html -o build/slide.pptx
        env:
          MARP_USER: root:root

      - name: 上传打包文件
        uses: actions/upload-artifact@v4
        with:
          name: PPT-Outputs
          path: build/
